name: issue-llm-draft

on:
  issues:
    # Issueにラベルがついたら起動
    types: [labeled]

permissions:  # Personal access tokesを作る時のpermissionと同じような感じかな
  models: read
  issues: write

jobs:
  draft:
    # label名で条件分け
    if: github.event.label.name == 'llm-draft-fix'
    runs-on: ubuntu-latest

    steps:
        # これ入れないとリポジトリにアクセスできないらしい(runnner上にcloneしてこない?)
      - uses: actions/checkout@v6
      - name: Generate draft with GitHub Models
        env:
          # actionsではその場限りのtokenを自動で作ってくれる
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          PROMPT=$(cat <<EOF
          以下のIssueを読んで、修正、変更の叩き台を日本語のMarkdownで作成してください。
          Issue title:
          $ISSUE_TITLE
          Issue body:
          $ISSUE_BODY
          EOF
          )
          payload=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              model: "openai/gpt-5-mini",
              messages: [
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }'
          )
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d "$payload" > response.json
          jq -r '.choices[0].message.content' response.json > comment.md
      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file comment.md
